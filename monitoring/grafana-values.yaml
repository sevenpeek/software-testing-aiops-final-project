adminUser: admin
adminPassword: admin
service:
  type: NodePort
  nodePort: 30030
persistence:
  enabled: false
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: online-boutique
        orgId: 1
        folder: Online Boutique
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/online-boutique
dashboards:
  online-boutique:
    online-boutique-overview:
      json: |
        {
          "annotations": {
            "list": [
              {
                "builtIn": 1,
                "datasource": {"type": "grafana", "uid": "-- Grafana --"},
                "enable": true,
                "hide": true,
                "iconColor": "rgba(0, 211, 255, 1)",
                "name": "Annotations & Alerts",
                "type": "dashboard"
              }
            ]
          },
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "id": null,
          "links": [],
          "liveNow": false,
          "panels": [
            {
              "datasource": {"type": "prometheus", "uid": "Prometheus"},
              "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []},
              "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
              "id": 1,
              "options": {"colorMode": "background", "graphOrientation": "auto", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showPercentChange": false, "textMode": "auto", "wideLayout": true},
              "pluginVersion": "11.0.0",
              "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"online-boutique\",condition=\"true\"})", "legendFormat": "Ready pods", "refId": "A"}],
              "title": "Online Boutique Ready Pods",
              "type": "stat"
            },
            {
              "datasource": {"type": "prometheus", "uid": "Prometheus"},
              "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []},
              "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
              "id": 2,
              "options": {"colorMode": "background", "graphOrientation": "auto", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showPercentChange": false, "textMode": "auto", "wideLayout": true},
              "targets": [{"expr": "sum(kube_pod_container_status_restarts_total{namespace=\"online-boutique\"})", "legendFormat": "Restarts", "refId": "A"}],
              "title": "Container Restarts",
              "type": "stat"
            },
            {
              "datasource": {"type": "prometheus", "uid": "Prometheus"},
              "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 8, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineInterpolation": "linear", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}}}, "overrides": []},
              "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
              "id": 3,
              "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
              "targets": [{"expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"online-boutique\",container!=\"\"}[1m]))", "legendFormat": "{{pod}}", "refId": "A"}],
              "title": "CPU Usage by Pod",
              "type": "timeseries"
            },
            {
              "datasource": {"type": "prometheus", "uid": "Prometheus"},
              "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "bytes", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 8, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineInterpolation": "linear", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}}}, "overrides": []},
              "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
              "id": 4,
              "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
              "targets": [{"expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"online-boutique\",container!=\"\"})", "legendFormat": "{{pod}}", "refId": "A"}],
              "title": "Memory Working Set by Pod",
              "type": "timeseries"
            },
            {
              "datasource": {"type": "prometheus", "uid": "Prometheus"},
              "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisCenteredZero": false, "axisColorMode": "text", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineInterpolation": "linear", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "always", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}}}, "overrides": []},
              "gridPos": {"h": 7, "w": 12, "x": 0, "y": 13},
              "id": 5,
              "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
              "targets": [{"expr": "sum by (deployment) (kube_deployment_status_replicas_ready{namespace=\"online-boutique\"})", "legendFormat": "{{deployment}}", "refId": "A"}],
              "title": "Ready Replicas by Deployment",
              "type": "timeseries"
            }
          ],
          "refresh": "10s",
          "schemaVersion": 39,
          "tags": ["online-boutique", "large-homework"],
          "templating": {"list": []},
          "time": {"from": "now-30m", "to": "now"},
          "timepicker": {},
          "timezone": "browser",
          "title": "Online Boutique Monitoring",
          "uid": "online-boutique-monitoring",
          "version": 1,
          "weekStart": ""
        }

