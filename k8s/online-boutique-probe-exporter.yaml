apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-boutique-probe-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: online-boutique-probe-exporter
  template:
    metadata:
      labels:
        app: online-boutique-probe-exporter
    spec:
      containers:
        - name: exporter
          image: online-boutique-probe-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9105
          env:
            - name: TARGET_URL
              value: http://frontend.online-boutique.svc.cluster.local/
            - name: INTERVAL_SECONDS
              value: "5"
          readinessProbe:
            httpGet:
              path: /health
              port: 9105
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: online-boutique-probe-exporter
  namespace: monitoring
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9105"
spec:
  selector:
    app: online-boutique-probe-exporter
  ports:
    - name: metrics
      port: 9105
      targetPort: 9105

